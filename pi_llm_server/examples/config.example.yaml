# PI-LLM-Server 配置文件示例
# 复制此文件为 ~/.config/pi-llm-server/config.yaml 并根据实际情况修改

# =============================================
# 服务基础配置
# =============================================
server:
  host: "0.0.0.0"
  port: 8090
  workers: 4
  log_level: "info"

# =============================================
# API 访问控制
# =============================================
auth:
  enabled: true
  tokens:
    - "sk-5f8b839908d14561590b70227c72ca86"


# =============================================
# 请求队列配置 - 差异化策略
# =============================================
queue:
  enabled: true
  # 全局默认配置
  default:
    max_size: 100
    max_concurrent: 1
    timeout_seconds: 300
  # 按服务类型差异化配置
  services:
    embedding:
      max_concurrent: 1      # GPU 推理，顺序处理避免显存溢出
      max_size: 200
      timeout_seconds: 60
    reranker:
      max_concurrent: 4      # CPU 多核并行
      max_size: 200
      timeout_seconds: 120
    asr:
      max_concurrent: 1      # GPU 推理，顺序处理避免显存溢出
      max_size: 50
      timeout_seconds: 600
    mineru:
      max_concurrent: 1      # PDF 解析耗时，顺序处理
      max_size: 20
      timeout_seconds: 1800

# =============================================
# 子服务配置
# =============================================
services:
  embedding:
    enabled: true
    base_url: "http://127.0.0.1:8091"
    timeout_seconds: 60
    max_retries: 3
    models:
      - id: "unsloth/Qwen3-Embedding-0.6B"
        path: "~/.cache/modelscope/hub/models/unsloth/Qwen3-Embedding-0.6B"
        device: "cuda"       # cpu 或 cuda
        launch_script: "python embedding_server.py --model-path {path} --device {device}"

  asr:
    enabled: true
    base_url: "http://127.0.0.1:8092"
    timeout_seconds: 1800
    max_retries: 2
    models:
      - id: "Qwen/Qwen3-ASR-1.7B"
        path: "~/.cache/modelscope/hub/models/Qwen/Qwen3-ASR-1.7B"
        gpu_memory_utilization: 0.9
        max_model_len: 32768
        launch_script: "python asr_server.py --model-path {path} --gpu-memory-utilization {gpu_memory_utilization}"

  reranker:
    enabled: true
    base_url: "http://127.0.0.1:8093"
    timeout_seconds: 120
    max_retries: 3
    models:
      - id: "Qwen/Qwen3-Reranker-0.6B"
        path: "~/.cache/modelscope/hub/models/Qwen/Qwen3-Reranker-0.6B"
        device: "cpu"       # cpu 或 cuda
        launch_script: "python reranker_server.py --model-path {path} --device {device}"

  mineru:
    enabled: true
    base_url: "http://127.0.0.1:8094"
    timeout_seconds: 1800
    max_retries: 1
    working_directory: ""   # 空表示使用脚本所在目录
    # 传递到 MinerU 的参数
    config:
      vram: "9000"          # 显存限制 (MB)，根据显卡调整 (2080Ti 建议 9000-11000)
      model_source: "modelscope"  # huggingface / modelscope / local（国内建议 modelscope）

# =============================================
# 健康检查配置
# =============================================
health_check:
  enabled: true
  interval_seconds: 30    # 轮询间隔
  timeout_seconds: 10     # 单次检查超时
  unhealthy_threshold: 3  # 连续失败次数判定为不健康
